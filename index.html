<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#020b2d,#041b5a,#062d8b);
    color:#ffffff;
}

header{
    background:#02143d;
    color:#ffffff;
    padding:25px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,140,255,0.4);
}

header h1,
header p,
h2,
p,
label,
footer{
    text-shadow:
        0 0 5px #ffffff,
        0 0 10px #b3e5ff,
        0 0 20px #66ccff;
}

nav{
    background:#03245f;
    text-align:center;
    padding:15px;
}

nav a{
    color:#ffffff;
    text-decoration:none;
    margin:0 18px;
    font-weight:bold;
    text-shadow:0 0 8px #ffffff;
}

nav a:hover{
    color:#7fdfff;
}

section{
    max-width:900px;
    margin:30px auto;
    padding:25px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:12px;
    backdrop-filter:blur(8px);
    box-shadow:0 0 20px rgba(0,150,255,0.25);
}

h2{
    color:#ffffff;
    margin-bottom:15px;
}

input,
textarea{
    width:100%;
    padding:12px;
    background:#061c4d;
    color:white;
    border:1px solid #4db8ff;
    border-radius:6px;
}

input::placeholder,
textarea::placeholder{
    color:#cfefff;
}

button{
    background:#0099ff;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    box-shadow:0 0 10px #00bfff;
    transition:0.3s;
}

button:hover{
    background:#00bfff;
    box-shadow:
        0 0 15px #00bfff,
        0 0 30px #00bfff;
}

footer{
    background:#02143d;
    text-align:center;
    padding:18px;
    margin-top:40px;
    box-shadow:0 0 20px rgba(0,140,255,0.3);
}
